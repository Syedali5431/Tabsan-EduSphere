name: dotnet-ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  db-validation:
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: EduSphere!CiSql2026
        ports:
          - 1433:1433

    env:
      MSSQL_SA_PASSWORD: EduSphere!CiSql2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for SQL Server readiness
        run: |
          for i in {1..60}; do
            if docker exec "${{ job.services.mssql.id }}" /opt/mssql-tools18/bin/sqlcmd \
              -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" >/dev/null 2>&1; then
              echo "SQL Server is ready."
              exit 0
            fi
            sleep 2
          done
          echo "SQL Server did not become ready in time."
          exit 1

      - name: Apply schema and core seed scripts
        run: |
          cat Scripts/01-Schema-Current.sql | docker exec -i "${{ job.services.mssql.id }}" /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C -b -d master

          cat Scripts/02-Seed-Core.sql | docker exec -i "${{ job.services.mssql.id }}" /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C -b -d Tabsan-EduSphere

      - name: Run post-deployment checks script
        run: |
          cat Scripts/05-PostDeployment-Checks.sql | docker exec -i "${{ job.services.mssql.id }}" /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C -b -W -s "," -d master > ci-postdeployment-checks.txt

      # - name: Enforce integrity assertions
      #   run: |
      #     docker exec "${{ job.services.mssql.id }}" /opt/mssql-tools18/bin/sqlcmd \
      #       -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C -b -d Tabsan-EduSphere -Q "
      #       SET NOCOUNT ON;
      #
      #       IF EXISTS (
      #         SELECT 1 FROM academic_programs ap LEFT JOIN departments d ON d.Id = ap.DepartmentId WHERE d.Id IS NULL
      #         UNION ALL
      #         SELECT 1 FROM courses c LEFT JOIN departments d ON d.Id = c.DepartmentId WHERE d.Id IS NULL
      #         UNION ALL
      #         SELECT 1 FROM student_profiles sp LEFT JOIN departments d ON d.Id = sp.DepartmentId WHERE d.Id IS NULL
      #         UNION ALL
      #         SELECT 1 FROM student_profiles sp LEFT JOIN academic_programs ap ON ap.Id = sp.ProgramId WHERE ap.Id IS NULL
      #         UNION ALL
      #         SELECT 1 FROM course_offerings co LEFT JOIN courses c ON c.Id = co.CourseId WHERE c.Id IS NULL
      #         UNION ALL
      #         SELECT 1 FROM course_offerings co LEFT JOIN semesters s ON s.Id = co.SemesterId WHERE s.Id IS NULL
      #         UNION ALL
      #         SELECT 1 FROM enrollments e LEFT JOIN student_profiles sp ON sp.Id = e.StudentProfileId WHERE sp.Id IS NULL
      #         UNION ALL
      #         SELECT 1 FROM enrollments e LEFT JOIN course_offerings co ON co.Id = e.CourseOfferingId WHERE co.Id IS NULL
      #         UNION ALL
      #         SELECT 1 FROM faculty_department_assignments fda LEFT JOIN departments d ON d.Id = fda.DepartmentId WHERE d.Id IS NULL
      #         UNION ALL
      #         SELECT 1 FROM admin_department_assignments ada LEFT JOIN departments d ON d.Id = ada.DepartmentId WHERE d.Id IS NULL
      #       )
      #       BEGIN
      #         RAISERROR('CI database validation failed: orphaned FK references detected.', 16, 1);
      #       END;
      #
      #       IF EXISTS (
      #         SELECT 1
      #         FROM departments
      #         WHERE (TenantId IS NULL AND CampusId IS NOT NULL)
      #            OR (TenantId IS NOT NULL AND CampusId IS NULL)
      #         UNION ALL
      #         SELECT 1
      #         FROM users
      #         WHERE (TenantId IS NULL AND CampusId IS NOT NULL)
      #            OR (TenantId IS NOT NULL AND CampusId IS NULL)
      #       )
      #       BEGIN
      #         RAISERROR('CI database validation failed: tenant/campus scope pairing is inconsistent.', 16, 1);
      #       END;
      #
      #       PRINT 'CI database integrity assertions passed.';
      #       "

      - name: Upload database validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-postdeployment-checks
          path: ci-postdeployment-checks.txt

  build-test:
    runs-on: ubuntu-latest
    needs: db-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Tabsan.EduSphere.sln

      - name: Build
        run: dotnet build Tabsan.EduSphere.sln --configuration Release --no-restore

      - name: Sidebar Permission Drift Gate
        run: |
          dotnet test tests/Tabsan.EduSphere.IntegrationTests/Tabsan.EduSphere.IntegrationTests.csproj \
            --configuration Release \
            --no-build \
            --filter FullyQualifiedName~SidebarMenuIntegrationTests \
            --verbosity normal

      - name: Test
        run: |
          dotnet test Tabsan.EduSphere.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --results-directory TestResults \
            --logger "trx"

      - name: Generate module health summary
        if: always()
        shell: pwsh
        run: |
          ./tools/ci/Generate-TestModuleSummary.ps1 \
            -ResultsDirectory "TestResults" \
            -OutputMarkdown "test-module-summary.md" \
            -OutputJson "test-module-summary.json"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: TestResults

      - name: Upload module health summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-module-health-summary
          path: |
            test-module-summary.md
            test-module-summary.json

      - name: Vulnerability scan
        run: |
          dotnet list Tabsan.EduSphere.sln package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "::warning::Vulnerable packages detected — review vuln-report.txt"
          fi

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: vuln-report.txt

  load-test:
    runs-on: ubuntu-latest
    needs: build-test
    # Only run load tests on pushes to main (not every PR to save minutes)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore & Build API
        run: |
          dotnet restore src/Tabsan.EduSphere.API/Tabsan.EduSphere.API.csproj
          dotnet build src/Tabsan.EduSphere.API/Tabsan.EduSphere.API.csproj --configuration Release --no-restore

      - name: Start API (background)
        run: |
          dotnet run --project src/Tabsan.EduSphere.API --configuration Release \
            --urls "http://localhost:5000" &
          echo "Waiting for API to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:5000/health; do sleep 2; done'
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ConnectionStrings__DefaultConnection: "Data Source=(localdb)\\MSSQLLocalDB;Initial Catalog=TabsanEduSphere_CI;Integrated Security=True;"

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/etc/apt/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install -y k6

      - name: Run load test (smoke only in CI)
        run: |
          k6 run --env BASE_URL=http://localhost:5000 \
            --env K6_SCENARIO=smoke \
            --out json=load-test-results.json \
            tests/load/k6-baseline.js || echo "::warning::Load test thresholds not met — review load-test-results.json"

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: load-test-results.json

  lighthouse:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore & Build Web
        run: |
          dotnet restore src/Tabsan.EduSphere.Web/Tabsan.EduSphere.Web.csproj
          dotnet build src/Tabsan.EduSphere.Web/Tabsan.EduSphere.Web.csproj --configuration Release --no-restore

      - name: Start Web (background)
        run: |
          dotnet run --project src/Tabsan.EduSphere.Web --configuration Release \
            --urls "http://localhost:5001" &
          echo "Waiting for Web to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:5001/; do sleep 2; done'
        env:
          ASPNETCORE_ENVIRONMENT: Development

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: .lighthouserc.yml
          uploadArtifacts: true
          temporaryPublicStorage: true
